<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supply Chain Darah</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<h2>🚚 Supply Chain Transfusi Darah</h2>

</header>

<div class="container">

<h2>🚚 Rantai Pasokan Transfusi Darah Malaysia</h2>

<label>ID Kantong Darah</label>
<input type="text" id="kantong" placeholder="BCM-0001">

<label>Tahap Supply Chain</label>

<select id="status">
<option>Pendonor</option>
<option>Pusat Darah Negara Malaysia</option>
<option>Pemeriksaan Laboratorium</option>
<option>Penyimpanan Darah</option>
<option>Distribusi</option>
<option>Rumah Sakit</option>
<option>Pasien</option>
</select>

<label>Lokasi Asal</label>
<input type="text" id="asal" placeholder="Contoh: Pusat Darah Negara">

<label>Lokasi Tujuan</label>
<input type="text" id="tujuan" placeholder="Contoh: Hospital Kuala Lumpur">

<button onclick="tambahDistribusi()">
💾 Simpan Data
</button>

<h2>Riwayat Supply Chain</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Asal</th>
<th>Tujuan</th>
<th>Status</th>
<th>Waktu</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="tabelDistribusi">

</tbody>

</table>

</div>

<script src="js/script.js"></script>

</body>

</html>

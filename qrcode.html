<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Scan QR Code</title>

<link rel="stylesheet"
href="css/style.css">

<header class="topbar">
<h2>📱 Scan QR BloodChain</h2>
</header>

<div class="container">

<div id="reader" style="width:100%;"></div>

</head>

<body>

<div class="topbar">

<h2>📱 Scan QR Code</h2>

</div>

<div class="container">

<div id="reader" style="width:100%;"></div>

<h3>Hasil Scan</h3>

<div id="hasil"
style="padding:15px;
background:#fff;
border-radius:10px;
margin-top:15px;">

Belum ada QR Code

</div>

</div>

<script>

function berhasil(decodedText){

document.getElementById("hasil").innerHTML=
"<b>"+decodedText+"</b>";

}

new Html5QrcodeScanner(

"reader",

{

fps:10,

qrbox:250

}

).render(berhasil);

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#c62828;
color:white;
padding:18px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:#d32f2f;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#b71c1c;
}

.result{
margin-top:20px;
padding:15px;
background:#e8f5e9;
border-radius:10px;
font-size:18px;
}

footer{
margin-top:25px;
background:#c62828;
color:white;
padding:15px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h2>⚖️ Kalkulator BMI</h2>

<h3>⚖️ Kalkulator BMI Malaysia</h3>

<h3>⚖️ BMI Calculator</h3>

</header>

<div class="container">

<div class="card">

<label>Nama | Nama | Name</label>
<input type="text" id="nama">

<label>Umur | Umur | Age</label>
<input type="number" id="umur">

<label>Jenis Kelamin | Jantina | Gender</label>

<select id="gender">

<option>Laki-laki | Lelaki | Male</option>

<option>Perempuan | Perempuan | Female</option>

</select>

<label>Berat Badan (kg) | Berat Badan (kg) | Weight (kg)</label>
<input type="number" id="berat">

<label>Tinggi Badan (cm) | Tinggi Badan (cm) | Height (cm)</label>
<input type="number" id="tinggi">

<button onclick="hitungBMI()">
Hitung BMI | Kira BMI | Calculate BMI
</button>

<div class="result" id="hasil">

Hasil BMI akan muncul di sini.

</div>

</div>

</div>

<footer>

BloodChain Malaysia 2026

<br>

BMI Indonesia • BMI Malaysia • BMI Calculator

</footer>

<script>

function hitungBMI(){

let bb=parseFloat(document.getElementById("berat").value);

let tb=parseFloat(document.getElementById("tinggi").value)/100;

if(isNaN(bb)||isNaN(tb)||tb<=0){

document.getElementById("hasil").innerHTML="Masukkan data dengan benar.";

return;

}

let bmi=(bb/(tb*tb)).toFixed(1);

let kategori="";

if(bmi<18.5){

kategori="Kurus | Kurus | Underweight";

}

else if(bmi<25){

kategori="Normal | Normal | Normal";

}

else if(bmi<30){

kategori="Gemuk | Berlebihan Berat | Overweight";

}

else{

kategori="Obesitas | Obesiti | Obesity";

}

document.getElementById("hasil").innerHTML=

"<b>BMI :</b> "+bmi+

"<br><br><b>Kategori :</b> "+kategori;

}

</script>

</body>

</html>

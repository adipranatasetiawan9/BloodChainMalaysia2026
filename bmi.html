<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#c62828;
color:white;
padding:18px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:#d32f2f;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#b71c1c;
}

.result{
margin-top:20px;
padding:15px;
background:#e8f5e9;
border-radius:10px;
font-size:18px;
}

footer{
margin-top:25px;
background:#c62828;
color:white;
padding:15px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h3>⚖️ BMI Calculator</h3>

</header>

<div class="container">

<div class="card">

<label>Nama | Nama | Name</label>
<input type="text" id="nama">

<label>Umur | Umur | Age</label>
<input type="number" id="umur">

<label>Jenis Kelamin | Jantina | Gender</label>

<select id="gender">

<option>Laki-laki | Lelaki | Male</option>

<option>Perempuan | Perempuan | Female</option>

</select>

<label>Berat Badan (kg) | Berat Badan (kg) | Weight (kg)</label>
<input type="number" id="berat">

<label>Tinggi Badan (cm) | Tinggi Badan (cm) | Height (cm)</label>
<input type="number" id="tinggi">

<button onclick="hitungBMI()">
Hitung BMI | Kira BMI | Calculate BMI
</button>

<div class="result" id="hasil">

Hasil BMI akan muncul di sini.

</div>

</div>

</div>

<script>

function hitungBMI(){

let bb=parseFloat(document.getElementById("berat").value);

let tb=parseFloat(document.getElementById("tinggi").value)/100;

if(isNaN(bb)||isNaN(tb)||tb<=0){

document.getElementById("hasil").innerHTML="Masukkan data dengan benar.";

return;

}

let bmi=(bb/(tb*tb)).toFixed(1);

let kategori="";
let keterangan="";

if(bmi<18.5){

kategori="Kurus (Underweight)";

keterangan=`
<b>Rekomendasi:</b><br><br>

• Berat badan Anda berada di bawah kisaran normal.<br>
• Tingkatkan asupan kalori sehat dengan mengonsumsi nasi, roti gandum, kentang, oatmeal, telur, ikan, daging tanpa lemak, susu, keju, kacang-kacangan, alpukat, dan buah-buahan.<br>
• Konsumsi makanan bergizi seimbang sebanyak 5 kali makan utama dan 3–5 kali makanan selingan setiap hari.<br>
• Lakukan latihan kekuatan (strength training) untuk meningkatkan massa otot.<br>
• Apabila berat badan terus menurun tanpa sebab yang jelas, segera lakukan pemeriksaan ke dokter atau ahli gizi.
`;

}

else if(bmi<25){

kategori="Berat Badan Ideal (Normal)";

keterangan=`
<b>Rekomendasi:</b><br><br>

• Berat badan Anda berada dalam kategori ideal.<br>
• Pertahankan pola makan bergizi seimbang sesuai Pedoman Gizi Seimbang.<br>
• Perbanyak konsumsi sayur, buah, protein tanpa lemak, dan air putih yang cukup.<br>
• Lakukan aktivitas fisik minimal 150 menit setiap minggu.<br>
• Hindari konsumsi makanan tinggi gula, garam, dan lemak secara berlebihan agar berat badan tetap stabil.
`;

}

else if(bmi<30){

kategori="Gemuk (Overweight)";

keterangan=`
<b>Rekomendasi:</b><br><br>

• Berat badan Anda melebihi kisaran normal sehingga risiko penyakit metabolik mulai meningkat.<br>
• Kurangi konsumsi makanan cepat saji, gorengan, minuman manis, dan makanan tinggi kalori.<br>
• Perbanyak konsumsi sayur, buah, protein rendah lemak, dan makanan tinggi serat.<br>
• Lakukan olahraga aerobik seperti jalan cepat, jogging, bersepeda, atau berenang minimal 30 menit setiap hari.<br>
• Pantau berat badan secara berkala dan konsultasikan dengan tenaga kesehatan apabila diperlukan.
`;

}

else{

kategori="Obesitas";

keterangan=`
<b>Rekomendasi:</b><br><br>

• Nilai BMI menunjukkan kategori obesitas yang dapat meningkatkan risiko diabetes, hipertensi, penyakit jantung, stroke, dan gangguan metabolisme lainnya.<br>
• Terapkan pola makan sehat dengan mengurangi gula, garam, lemak jenuh, serta makanan olahan.<br>
• Tingkatkan aktivitas fisik secara bertahap sesuai kemampuan tubuh.<br>
• Lakukan pemeriksaan kesehatan secara berkala untuk memantau tekanan darah, kadar gula darah, dan kolesterol.<br>
• Sangat disarankan berkonsultasi dengan dokter atau ahli gizi untuk mendapatkan program penurunan berat badan yang aman dan sesuai kondisi kesehatan.
`;

}

document.getElementById("hasil").innerHTML=

"<h3>📊 Hasil Perhitungan BMI</h3>"+
"<b>Nilai BMI :</b> "+bmi+
"<br><br><b>Kategori :</b> "+kategori+
"<br><br>"+keterangan;

}

</script>

</body>

</html>

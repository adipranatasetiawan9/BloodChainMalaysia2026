<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator | BloodChain Malaysia 2026</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#b71c1c;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:500px;
    margin:25px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#b71c1c;
    color:white;
    font-size:17px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#8b0000;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f9f9f9;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">
⚖️ BMI Calculator
</div>

<div class="container">

<label>Weight (kg)</label>

<input
type="number"
id="weight"
placeholder="Example : 65">

<label>Height (cm)</label>

<input
type="number"
id="height"
placeholder="Example : 170">

<button onclick="calculateBMI()">

Calculate BMI

</button>

<div class="result">

<h3 id="bmi"></h3>

<p id="status"></p>

<p id="ideal"></p>

<p id="advice"></p>

</div>

</div>

<script>

function calculateBMI(){

let weight=parseFloat(document.getElementById("weight").value);

let height=parseFloat(document.getElementById("height").value)/100;

if(isNaN(weight)||isNaN(height)){

alert("Please enter weight and height.");

return;

}

let bmi=(weight/(height*height)).toFixed(1);

let status="";
let advice="";

if(bmi<18.5){

status="Underweight";

advice="Increase nutritious food intake and consult a nutrition specialist.";

}else if(bmi<25){

status="Normal";

advice="Maintain a healthy lifestyle and exercise regularly.";

}else if(bmi<30){

status="Overweight";

advice="Reduce calorie intake and increase physical activity.";

}else{

status="Obesity";

advice="Consult a doctor for weight management.";

}

let ideal=((18.5+24.9)/2*(height*height)).toFixed(1);

document.getElementById("bmi").innerHTML="BMI : "+bmi;

document.getElementById("status").innerHTML="Status : "+status;

document.getElementById("ideal").innerHTML="Ideal Weight : "+ideal+" kg";

document.getElementById("advice").innerHTML="Recommendation : "+advice;

}

</script>

</body>
</html>

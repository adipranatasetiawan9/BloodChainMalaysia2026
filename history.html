<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Riwayat Distribusi Darah</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">

<h2>📋 Riwayat Distribusi Darah</h2>

</header>

<div class="container">

<h2>Riwayat Distribusi Darah</h2>

<input
type="text"
id="cari"
placeholder="🔍 Cari berdasarkan ID, Rumah Sakit atau Status..."
onkeyup="cariRiwayat()">

<br><br>

<label>Dari Tanggal</label>

<input type="date" id="tanggalAwal">

<label>Sampai</label>

<input type="date" id="tanggalAkhir">

<br><br>

<button onclick="filterTanggal()">
Filter
</button>

<button onclick="hapusSemuaRiwayat()">
🗑 Hapus Semua
</button>

<br><br>

<table>

<thead>

<tr>

<th>ID</th>

<th>Asal</th>

<th>Tujuan</th>

<th>Status</th>

<th>Waktu</th>

</tr>

</thead>

<tbody id="tabelHistory">

</tbody>

</table>

</div>

<script src="js/script.js"></script>

</body>

</html>
<script src="js/script.js"></script>

<script>

function hapusSemuaRiwayat(){

if(confirm("Hapus seluruh riwayat?")){

localStorage.removeItem("distribusi");

tampilHistory();

}

}

function filterTanggal(){

alert("Fitur filter tanggal akan aktif pada versi 9.2");

}

</script>
